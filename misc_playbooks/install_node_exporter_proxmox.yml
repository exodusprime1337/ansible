---
- name: Install Node Exporter
  hosts: hypervisors
  remote_user: ansible
  become: yes
  become_method: sudo

  vars:
    node_file: node_exporter-1.10.2.linux-amd64
    node_exporter_url: https://github.com/prometheus/node_exporter/releases/download/v1.10.2/node_exporter-1.10.2.linux-amd64.tar.gz

  tasks:
    - name: Check if node_exporter is already installed
      ansible.builtin.stat:
        path: /usr/local/bin/node_exporter
      register: node_exporter_bin

    - name: Install Node Exporter (only if missing)
      when: not node_exporter_bin.stat.exists
      block:
        - name: Install wget
          ansible.builtin.package:
            name: wget
            state: present

        - name: Download Node Exporter
          ansible.builtin.get_url:
            url: "{{ node_exporter_url }}"
            dest: "/tmp/{{ node_file }}.tar.gz"

        - name: Extract and install Node Exporter
          ansible.builtin.unarchive:
            src: "/tmp/{{ node_file }}.tar.gz"
            dest: /tmp
            remote_src: yes

        - name: Create node_exporter user
          ansible.builtin.user:
            name: node_exporter
            system: yes
            shell: /usr/sbin/nologin
            create_home: no
        - name: Copy node_exporter binary
          ansible.builtin.copy:
            src: "/tmp/{{ node_file }}/node_exporter"
            dest: /usr/local/bin/node_exporter
            owner: node_exporter
            group: node_exporter
            mode: "0755"
            remote_src: yes

        - name: Create Node Exporter service
          ansible.builtin.copy:
            dest: /etc/systemd/system/node_exporter.service
            content: |
              [Unit]
              Description=Node Exporter
              Wants=network-online.target
              After=network-online.target

              [Service]
              User=node_exporter
              Group=node_exporter
              Type=simple
              ExecStart=/usr/local/bin/node_exporter

              [Install]
              WantedBy=multi-user.target

        - name: Enable and start Node Exporter
          ansible.builtin.systemd:
            name: node_exporter
            enabled: yes
            state: started
            daemon_reload: yes

        - name: Cleanup temp files
          ansible.builtin.file:
            path: "/tmp/{{ item }}"
            state: absent
          loop:
            - "{{ node_file }}"
            - "{{ node_file }}.tar.gz"
